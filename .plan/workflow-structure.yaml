linear: true
yaml_source_mode: inline-only
verifier_encoding: explicit-phases
phases:
  - order: 1
    id: impl_dependent_image_scaffold
    type: implement
    bounce_target: null
    required_preexisting_inputs:
      - dependents.json
      - test-original.sh
      - test-safe.sh
      - safe/scripts/check-dependent-builds.sh
      - safe/scripts/build-deb.sh
      - safe/README.md
      - safe/COMPATIBILITY.md
      - safe/dist/*.deb when present
